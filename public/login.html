<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioAdmin - Acceso y Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal flex flex-col min-h-screen">

    <header class="bg-white shadow-md fixed w-full z-50">
        <div class="container mx-auto flex items-center justify-between px-6 py-3">
            <div class="flex items-center">
                <button id="mobile-menu-button" class="text-gray-600 focus:outline-none lg:hidden mr-4">
                    <i class="fas fa-bars fa-lg"></i>
                </button>
                <span class="text-xl font-bold text-blue-600 tracking-tight">
                    <i class="fas fa-book-reader mr-2"></i>BiblioAdmin
                </span>
            </div>

            <nav class="hidden md:flex space-x-6 items-center font-medium text-gray-600">
                <a href="#" class="hover:text-blue-500 transition">Inicio</a>
                <a href="#" class="hover:text-blue-500 transition">Usuarios</a>
                <a href="#" class="hover:text-blue-500 transition">Libros</a>
                <a href="#" class="hover:text-blue-500 transition">Préstamos</a>
                <a href="#" class="flex items-center text-red-500 hover:text-red-700 transition">
                    <i class="fas fa-sign-out-alt mr-1"></i> Salir
                </a>
            </nav>
        </div>
    </header>

    <main class="flex-grow pt-24 pb-12 px-6 flex flex-col items-center">
        
        <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-8 mb-12">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-blue-600">Iniciar Sesión</h2>
                <p class="text-gray-500">Accede a tu panel de control</p>
            </div>

            <form action="#" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                    <input type="email" name="email" placeholder="ejemplo@correo.com" required 
                        class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-md text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                    <input type="password" name="password" placeholder="••••••••" required 
                        class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-md text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm">
                </div>

                <button type="submit" 
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-150">
                    Entrar al Sistema
                </button>
            </form>
        </div>

        <div class="w-full max-w-md flex items-center mb-12">
            <div class="flex-grow border-t border-gray-300"></div>
            <span class="mx-4 text-gray-400 text-sm">O TAMBIÉN</span>
            <div class="flex-grow border-t border-gray-300"></div>
        </div>

        <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-blue-600">Crear Cuenta</h2>
                <p class="text-gray-500">Regístrate como nuevo administrador</p>
            </div>

            <form action="#" method="POST" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Nombre</label>
                        <input type="text" name="nombre" required 
                            class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-md text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Apellido</label>
                        <input type="text" name="apellido" required 
                            class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-md text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                    <input type="email" name="email" placeholder="usuario@biblioteca.com" required 
                        class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-md text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                    <input type="password" name="password" required 
                        class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-md text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Repetir Contraseña</label>
                    <input type="password" name="repeat_password" required 
                        class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-md text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm">
                </div>

                <button type="submit" 
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-150">
                    Completar Registro
                </button>
            </form>
        </div>
    </main>

    <footer class="w-full bg-white border-t border-gray-200 py-8 mt-auto">
        <div class="container mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-center text-center md:text-left">
                <div class="mb-4 md:mb-0">
                    <span class="text-lg font-bold text-blue-600 tracking-tight">
                        <i class="fas fa-book-reader mr-2"></i>BiblioAdmin
                    </span>
                    <p class="text-gray-500 text-sm mt-1">
                        &copy; 2026 Sistema de Gestión Bibliotecaria.
                    </p>
                </div>

                <div class="flex space-x-6 text-sm font-medium text-gray-600 mb-4 md:mb-0">
                    <a href="#" class="hover:text-blue-500 transition">Privacidad</a>
                    <a href="#" class="hover:text-blue-500 transition">Términos</a>
                    <a href="#" class="hover:text-blue-500 transition">Ayuda</a>
                </div>

                <div class="flex space-x-4 text-gray-400">
                    <a href="#" class="hover:text-blue-600 transition"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="hover:text-blue-400 transition"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="hover:text-gray-900 transition"><i class="fab fa-github"></i></a>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
